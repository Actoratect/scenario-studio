# PR-AK / PR-AL: GitHub Pages 配信 + portable zip artifact 配布。
#
# トリガ:
#   - push to main → 自動 deploy
#   - workflow_dispatch (Actions タブから手動) → 任意 branch を deploy
#
# 出力:
#   1. Pages: https://<owner>.github.io/<repo>/ (sub-path build)
#   2. Portable zip: Actions run の Artifacts セクションから DL (root-path build, 30 日保持)
#      展開 → `npx serve <フォルダ>` → http://localhost:3000 で起動
#      README.txt に手順を同梱
#
# 初回セットアップ:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"

name: Deploy GitHub Pages + portable zip

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Pages へ deploy するか (false なら zip artifact のみ生成)'
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

# 同時 deploy の競合を避ける (古い deploy はキャンセル)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend (Pages + portable zip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Build 1: GitHub Pages 用 (サブパス)
      - name: Build for Pages (VITE_BASE_PATH=/scenario-studio/)
        run: pnpm -F @scenario-studio/frontend build
        env:
          VITE_BASE_PATH: /scenario-studio/
      - name: Stash Pages build
        run: mv packages/frontend/dist pages-dist

      # Build 2: portable zip 用 (ルートパス、ローカル `npx serve` で動く)
      - name: Build portable (default base = /)
        run: pnpm -F @scenario-studio/frontend build
      - name: Add README to portable build
        run: |
          cat > packages/frontend/dist/README.txt <<'EOF'
          Scenario Studio — portable static build
          ========================================

          展開後、HTTP サーバ経由で配信してください (file:// では動きません):

          # Node.js があれば 1 行
          npx serve .

          # Python なら
          python -m http.server 8080

          # その他、Caddy / nginx / IIS など任意の static server で OK

          表示後は Chrome / Edge で開いてください
          (File System Access API が必要なため Safari/Firefox は OPFS sandbox に fallback)。

          GitHub Pages 公開版: https://actoratect.github.io/scenario-studio/
          EOF

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: scenario-studio-portable-${{ github.sha }}
          path: packages/frontend/dist/
          retention-days: 30
          if-no-files-found: error

      # GitHub Pages 用 build を artifact に
      - name: Upload Pages artifact
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

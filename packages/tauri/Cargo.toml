[package]
name = "scenario-studio-tauri"
version = "0.0.0"
description = "Actoratect Scenario Studio — Desktop (Tauri 2) wrapper"
authors = ["Actoratect"]
edition = "2021"
license = "UNLICENSED"
publish = false

# Tauri 2 では通常 lib + main の両方を持つ。Rust 側のロジックは lib に集約し、
# main は OS バイナリのエントリだけにする。
[lib]
name = "scenario_studio_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
glob = "0.3"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true

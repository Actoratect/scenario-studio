<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      M8 セキュリティ: strict CSP。
      - script-src 'self' のみ — XSS 経路を塞ぐ (eval 系は元から禁止)
      - connect-src で Anthropic / OpenAI / Ollama を許可 — 他は許さない
      - img-src data: は base64 サムネイル用
      - style-src 'self' 'unsafe-inline' — Vite の inject style で必要 (Phase 2 で hash 化)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.anthropic.com https://api.openai.com http://localhost:11434; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none';"
    />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#1f2937" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Scenario Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

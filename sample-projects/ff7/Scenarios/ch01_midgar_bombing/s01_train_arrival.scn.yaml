  - { kind: line, who: cloud, emotion: calm, text: '...わかってる。' }
  - { kind: aside, text: '傭兵。それが今の俺の肩書きだ。' }
  - { kind: line, who: barret, emotion: angry, text: '金もらってんだろうが。さっさとついて来な。' }
  - { kind: stage, text: '改札を抜け、二人は魔晄炉へ向かう。' }
  - { kind: sfx, name: 'ambient_steam' }
